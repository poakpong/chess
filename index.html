    <meta name="description" content="เล่นหมากรุกสากลออนไลน์กับเพื่อนแบบเรียลไทม์ ไม่ต้องสมัครสมาชิก">
    <meta name="keywords" content="chess, หมากรุก, หมากรุกสากล, chess online, เล่นหมากรุกออนไลน์">

    <meta name="twitter:card" content="summary">
    <meta name="twitter:url" content="https://chess.poakpong.com/">
    <meta name="twitter:title" content="Chess Online - เล่นหมากรุกออนไลน์">
    <meta name="twitter:description" content="เล่นหมากรุกสากลออนไลน์กับเพื่อนแบบเรียลไทม์ ไม่ต้องสมัครสมาชิก">

    <!-- iOS standalone -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Chess">

    <link rel="stylesheet" href="style.css">
    <script src="peerjs.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- หน้าแรก: เลือกสร้างห้องหรือเข้าห้อง -->
        <div id="home-screen" class="screen active">
            <h1>♟️ Chess Online</h1>
            <p>เล่นหมากรุกออนไลน์กับเพื่อน</p>
            
            <div class="menu">
                <button id="btn-create-room" class="btn btn-primary">
                    🎮 สร้างห้องใหม่
                </button>
                <div class="or">หรือ</div>
                <div class="join-form">
                    <input type="text" id="room-input" placeholder="ใส่รหัสห้อง (เช่น abc123)" maxlength="10">
                    <button id="btn-join-room" class="btn btn-secondary">
                        🔗 เข้าร่วมห้อง
                    </button>
                </div>
            </div>
            
            <div class="info">
                <p>💡 วิธีเล่น: สร้างห้อง → ส่งลิงก์ให้เพื่อน → เริ่มเล่น!</p>
            </div>
        </div>

        <!-- หน้ารอผู้เล่น -->
        <div id="waiting-screen" class="screen">
            <h2>⏳ รอผู้เล่น...</h2>
            <div class="room-info">
                <p>รหัสห้อง: <strong id="room-id-display"></strong></p>
                <p>ส่งลิงก์นี้ให้เพื่อน:</p>
                <input type="text" id="room-link" readonly>
                <button id="btn-copy-link" class="btn btn-small">📋 คัดลอก</button>
            </div>
            <div class="status">
                <span class="dot waiting"></span>
                <span id="waiting-text">รอผู้เล่นคนที่สอง...</span>
            </div>
        </div>

        <!-- หน้าเล่นเกม -->
        <div id="game-screen" class="screen">
            <div class="game-header">
                <div class="player-info" id="player-black">
                    <span class="color">⚫</span>
                    <span class="name">คู่แข่ง (ดำ)</span>
                    <span class="timer" id="timer-black">10:00</span>
                </div>
                <div class="game-status">
                    <div id="turn-indicator">⚪ ตาของขาว (คุณ)</div>
                    <div id="game-message"></div>
                </div>
                <div class="player-info" id="player-white">
                    <span class="color">⚪</span>
                    <span class="name">คุณ (ขาว)</span>
                    <span class="timer" id="timer-white">10:00</span>
                </div>
            </div>

            <div class="board-container">
                <div id="captured-black" class="captured-pieces"></div>
                <canvas id="chess-board" width="480" height="480"></canvas>
                <div id="captured-white" class="captured-pieces"></div>
            </div>

            <div class="game-controls">
                <button id="btn-resign" class="btn btn-danger">🏳️ ยอมแพ้</button>
                <button id="btn-draw" class="btn btn-warning">🤝 เสนอเสมอ</button>
                <button id="btn-new-game" class="btn btn-primary" style="display:none;">🔄 เริ่มใหม่</button>
                <button id="btn-home" class="btn btn-secondary">🏠 กลับหน้าแรก</button>
            </div>

            <div class="move-history">
                <h3>📜 ประวัติการเดิน</h3>
                <div id="move-list"></div>
            </div>
        </div>
        <!-- Promotion Modal -->
        <div id="promotion-modal" class="modal" style="display:none;">
            <div class="modal-content">
                <h3>เลือกตัวหมากที่ต้องการ</h3>
                <div class="promotion-pieces">
                    <button class="promotion-btn" data-piece="queen">♛</button>
                    <button class="promotion-btn" data-piece="rook">♜</button>
                    <button class="promotion-btn" data-piece="bishop">♝</button>
                    <button class="promotion-btn" data-piece="knight">♞</button>
                </div>
            </div>
        </div>
    </div>

    <script src="chess.js"></script>
    <script src="network.js"></script>
    <script src="app.js"></script>
</body>
</html>
